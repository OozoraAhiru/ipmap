name: Update Blocklists

on:
  schedule:
    # Run daily at 04:00 UTC (after all 5 RIRs have published their daily files)
    - cron: "0 4 * * *"
  workflow_dispatch:  # allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate blocklist files
        run: python scripts/generate.py

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet lists/ || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push updated lists
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lists/
          TODAY=$(date -u +"%Y-%m-%d")
          git commit -m "chore: update blocklists ${TODAY}"
          git push
