name: Update Blocklists

on:
  schedule:
    # Run daily at 04:00 UTC
    - cron: "0 4 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate blocklist files
        run: |
          # Support both layouts: script in root or in scripts/
          if [ -f "scripts/generate.py" ]; then
            python scripts/generate.py
          elif [ -f "generate.py" ]; then
            python generate.py
          else
            echo "ERROR: generate.py not found in root or scripts/" && exit 1
          fi

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet lists/ || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push updated lists
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lists/
          TODAY=$(date -u +"%Y-%m-%d")
          git commit -m "chore: update blocklists ${TODAY}"
          git push
